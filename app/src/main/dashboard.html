<!DOCTYPE html>
<html>
<head>
    <title>SCEM Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }
        h1 {
            background: #2c7be5;
            color: white;
            padding: 15px;
        }
        .card {
            background: white;
            width: 250px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>Smart Campus Energy Manager</h1>

<div class="card">
    <h2>Classroom 1</h2>
    <p>Power Usage: 120 W</p>
</div>

<div class="card">
    <h2>Lab 1</h2>
    <p>Power Usage: 450 W</p>
</div>

<div class="card">
    <h2>Library</h2>
    <p>Power Usage: 300 W</p>
</div>

</body>
</html>
